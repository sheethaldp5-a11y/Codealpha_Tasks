<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>Enhanced Chatbot</h2>
        </div>
        <div class="chat-box" id="chat-box">
            <div class="bot-message">Hello! I'm an enhanced ChatBot. How can I help you today?</div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (message === "") return;

            appendMessage('user-message', message);
            inputField.value = "";

            fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                appendMessage('bot-message', data.response, data.sentiment);
            })
            .catch(error => {
                console.error('Error:', error);
                appendMessage('bot-message', "Sorry, I'm having trouble connecting to the server.");
            });
        }

        function appendMessage(className, message, sentiment) {
            const chatBox = document.getElementById('chat-box');
            const messageDiv = document.createElement('div');
            messageDiv.className = className;
            messageDiv.textContent = message;

            if (sentiment) {
                const sentimentSpan = document.createElement('span');
                sentimentSpan.className = `sentiment-label ${sentiment}`;
                sentimentSpan.textContent = sentiment;
                messageDiv.appendChild(sentimentSpan);
            }

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
